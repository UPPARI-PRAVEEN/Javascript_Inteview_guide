<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <fieldset>
        <legend style="font-size: 1.3rem">Register Form</legend>
        <form action="http://www.google.com" method="post" autocomplete="on">
          <table>
            <tr>
                <td><label for="date">Search </label></td>
                <td><input type="search" disabled placeholder="Search for any thing"  id="date" name="date"></td>
            </tr>
            <tr>
              <td><label for="name">First Name: </label></td>
              <td><input type="text" value="Praveen" autofocus required placeholder="Enter ur name" id="name" name="name" /></td>
            </tr>
            <tr>
              <td><label for="lname">Last Name: </label></td>
              <td><input type="text" placeholder="Enter ur lname" readonly value="kumar" required id="Lname" name="Lname" /></td>
            </tr>
            <tr>
              <td><label for="phone">Phone: </label></td>
              <td><input type="tel" id="phone" minlength="10"  required maxlength="10" name="phone" /></td>
            </tr>
            <tr>
              <td><label for="age">Age: </label></td>
              <td><input type="number"  id="age" name="age" required /></td>
            </tr>
            <tr>
                <td><label for="date">DOB</label></td>
                <td><input type="date" id="date" name="date"></td>
            </tr>
            <tr>
                <td><label for="date-time">local Time</label></td>
                <td><input type="datetime-local" id="date-time" name="date-time"></td>
            </tr>
            <tr>
                <td><label for="date">Month</label></td>
                <td><input type="month" id="monthe" name="month"></td>
            </tr>
            <tr>
                <td><label for="image">Image</label></td>
                <td><input type="image" src="./p1.jpeg" name="image" id="image" height="100px" width="100px"></td>
            </tr>
            <tr>
                <td><label for="hidden">Hidden</label></td>
                <td><input type="hidden" id="hidden" name="hidden"></td>
            </tr>
            <tr>
                <td><label for="file">File</label></td>
                <td><input type="file" id="file" name="file"></td>
            </tr>
            <tr>
                <td><label for="color">Color</label></td>
                <td><input type="color" id="color" name="color"></td>
            </tr>
            <tr>
                <td><label for="url">submit</label></td>
                <td><input type="submit" id="url" name="url"></td>
            </tr>
            <tr>
                <td><label for="url">reset</label></td>
                <td><input type="reset" id="url" name="url"></td>
            </tr>
            <tr>
                <td><label for="url">URL</label></td>
                <td><input type="url" id="url" name="url" hidden></td>
            </tr>
            <tr>
              <td><label for="email">Email:</label></td>
              <td><input type="email" id="email" name="email" /></td>
            </tr>
            <tr>
              <td><label for="password">Password:</label></td>
              <td><input type="password" id="password" pattern="[a-z]{4}[A-Z]{4}[1-9]{4}" title="it can aspect only a-z=4 A-Z=4 1-9=4" name="password" /></td>
            </tr>
            <tr>
              <td><label for="cpassword">Confirm password:</label></td>
              <td><input type="password" id="cpassword" name="cpassword" /></td>
            </tr>
            <tr>
              <td><label for="address">Address: </label></td>
              <td>
                <textarea name="address" id="address" cols="30" rows="4">
hi</textarea
                >
              </td>
            </tr>
            <tr>
              <td><label for="countries">countries</label></td>
              <td>
                <table>
                  <tr>
                    <input list="countries" />
                    <datalist id="countries">
                      <option value="India">India</option>
                      <option value="aus">Australia</option>
                      <option value="pak">Pakistan</option>
                      <option value="Ban">Bangladesh</option>
                    </datalist>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td><label for="hobbies">Select ur hobbies</label></td>
              <td>
                <table>
                  <td>
                    <tr>
                      <td>
                        <input
                          type="checkbox"
                          id="hobbies"
                          name="hobbbies" checked
                        />Music
                      </td>
                    </tr>
                    <tr>
                      <td>
                        <input
                          type="checkbox"
                          id="hobbies"
                          name="hobbbies"
                        />Chess
                      </td>
                    </tr>
                    <tr>
                      <td>
                        <input
                          type="checkbox"
                          id="hobbies"
                          name="hobbbies"
                        />Chess
                      </td>
                    </tr>
                    <tr>
                      <td>
                        <input
                          type="checkbox"
                          id="hobbies"
                          name="hobbbies"
                        />Chess
                      </td>
                    </tr>
                  </td>
                </table>
              </td>
            </tr>
            <!-- <tr>
                    
                    
                    
                    <td><input type="checkbox" id="hobbies" name="hobbbies">indore games</td><br>
                    <td><input type="checkbox" id="hobbies" name="hobbbies">Eating</td>
                </tr> -->
            <tr>
              <td><label for="gender">Gender</label></td>
              <td>
                <table>
                  <tr>
                    <td><input type="radio" id="gender" name="gender" /></td>
                    <td><label for="">male</label></td>

                    <td><input type="radio" id="gender" name="gender" /></td>
                    <td><label for="">Female</label></td>
                    <td><input type="radio" id="gender" name="gender" checked/></td>
                    <td><label  for="">Other</label></td>
                  </tr>
                </table>
              </td>
              <!-- 
                    
                     -->
            </tr>
            
          </table>
          <button>Submit</button>
        </form>
      </fieldset>
    </div>
   
    <style>
      .container {
       margin: 0;
        background-color: antiquewhite;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      fieldset {
        background-color: white;
        width: 500px;
        padding: 10px;
        border-radius: 20px;
      }
      form {
        align-items: center;
        width: 700px;
      }
      label {
        font-size: 1.3rem;
      }
      input {
        margin: 10px;
        font-size: 1rem;
        border-radius: 5px;
      }
      button {
        padding: 10px 20px;
        background-color: blue;
        border: none;
        border-radius: 20px;
        margin-left: 15rem;
        color: white;
        font-size: 1rem;
      }
      button:hover{
        background-color: black;
        color: white;
      }
    </style>
  </body>
</html>
