<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            padding: 20px 40px;
            background: white;
            color: #333;
            font-size: 22px;
            font-weight: bold;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        #btn {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            background: #ff9800;
            color: white;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        #btn:hover {
            background: #e68900;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container" id="msg">
        <h1>Bunny</h1>
        <h6>12/03/3031</h6>
        <p>I am from chetlamallpuram</p>
    </div>
    <button id="btn">Hide Msg</button>

    <script src="./HideMsg.js"></script>
</body>
</html>
